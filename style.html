<style>
:root {
  --bg: #f7f7f9;
  --card: #ffffff;
  --border: #d8d8e0;
  --text: #1c1c1f;
  --muted: #6b6b75;
  --primary: #1f4fa3;
  --primary-text: #ffffff;
  --water: #6ea7d8;
  --water-deep: #3a6e9f;
  --pipe: #d8dade;
  --pipe-shadow: #a3a6ad;
  --barrier: #b8916e;
  --shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  padding: 12px;
}

#app { max-width: 1280px; margin: 0 auto; }

header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
header h1 { font-size: 1.25rem; margin: 0; font-weight: 600; }
header .subtitle { color: var(--muted); font-size: 0.9rem; }

.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin: 8px 0;
  padding: 10px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.toolbar label {
  font-size: 0.875rem;
  color: var(--muted);
  display: flex; gap: 6px; align-items: center;
}
.toolbar button {
  font-family: inherit; font-size: 0.875rem;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card); color: var(--text);
  cursor: pointer;
}
.toolbar button:hover { background: #eef0f3; }
.toolbar button.active { background: #e8eef8; border-color: var(--primary); color: var(--primary); }
.toolbar input[type="range"] { width: 160px; }

#slot-carousel {
  overflow-x: auto;
  flex-wrap: nowrap;
}
.slot-tile {
  flex: 0 0 auto;
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  min-width: 78px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.slot-tile:hover { background: #eef0f3; }
.slot-tile.selected { border-color: var(--primary); background: #e8eef8; }
.slot-tile .slot-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }
.slot-tile .slot-label { font-size: 0.72rem; font-weight: 600; }
.slot-tile .slot-param { font-size: 0.7rem; color: var(--muted); font-family: monospace; }
.slot-insert {
  flex: 0 0 auto;
  width: 22px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--muted);
  cursor: pointer;
  border-radius: 4px;
  user-select: none;
}
.slot-insert:hover { background: #eef0f3; color: var(--primary); }

#canvas-wrap {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
#canvas {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1200 / 700;
}
#probe-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.probe-badge {
  position: absolute;
  background: rgba(255, 255, 255, 0.96);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.78rem;
  box-shadow: var(--shadow);
  pointer-events: auto;
  cursor: grab;
  user-select: none;
  white-space: nowrap;
}
.probe-badge.dragging { cursor: grabbing; opacity: 0.85; }
.probe-badge .probe-label { font-weight: 600; color: var(--muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; }
.probe-badge .probe-value { color: var(--text); font-family: monospace; }
.probe-badge .probe-equiv { color: var(--primary); font-family: monospace; font-size: 0.72rem; }

#param-panel {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow);
  z-index: 10;
  min-width: 220px;
  pointer-events: auto;
}
#param-panel.hidden { display: none; }
#param-panel h3 { margin: 0 0 8px; font-size: 0.9rem; }
#param-panel label {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 0.8rem; color: var(--muted);
  margin-bottom: 8px;
}
#param-panel input[type="range"] { width: 100%; }
#param-panel .param-row {
  display: flex; justify-content: space-between; align-items: baseline;
}
.param-value { font-family: monospace; color: var(--text); font-size: 0.85em; }
#param-panel .param-actions {
  display: flex; gap: 6px; justify-content: flex-end;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 4px;
}
#param-panel button {
  font-family: inherit; font-size: 0.8rem;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--card); color: var(--text);
  cursor: pointer;
}
#param-panel button.danger { color: #a31e1e; }
#param-panel button:hover { background: #eef0f3; }

#loading {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(247, 247, 249, 0.95);
  font-size: 1rem; color: var(--muted);
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#loading.hidden { opacity: 0; }

.help-text {
  font-size: 0.78rem;
  color: var(--muted);
  padding: 6px 12px;
  margin-top: 4px;
}

#canvas.probing { cursor: crosshair; }
</style>
