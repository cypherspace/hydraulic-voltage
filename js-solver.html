<script>
// ===== SOLVER =====
// Modified Nodal Analysis (MNA) each physics tick.
//
// All pressure nodes (junctions + tanks) are unknowns. Tank capacitance
// (A/dt diagonal stamp + (A/dt)·h_old on RHS) is built into the matrix —
// this is implicit Euler, so the integrator is unconditionally stable
// regardless of pipe k. Diodes are iterated: start with kFwd, flip to
// kReverse if Q would be reverse.

function solveStep(dt) {
  const edges     = STATE.edges;
  const nodesById = STATE.nodesById;

  // Update pump dP in the pump edge component.
  const pumpEdge = STATE.edgesById[STATE.pumpEdgeId];
  if (pumpEdge) pumpEdge.comp.dP = getPumpDP();

  // ── assign solver indices to every node ─────────────────────────────────────
  // Tanks are no longer Dirichlet; their A/dt capacitance stamp grounds the system.
  const allNodes = STATE.nodes;
  const N = allNodes.length;
  for (let i = 0; i < N; i++) allNodes[i].solverIdx = i;

  const tanks = STATE.nodes.filter(n => n.kind === 'tank');

  // ── iterative solve with diode check ────────────────────────────────────────
  const diodeEdges = edges.filter(e => e.comp.kind === 'diode');
  let converged = false;

  for (let iter = 0; iter < CONFIG.PHYSICS.DIODE_MAX_ITER && !converged; iter++) {
    const result = runMNA(edges, tanks, N, nodesById, dt);
    if (!result) break;  // singular — leave Q at 0

    // Write solved pressures back to every node.
    for (let i = 0; i < N; i++) allNodes[i].p = result.x[i];

    // Compute Q for every edge.
    computeEdgeFlows(edges, nodesById, result);

    // Check diodes.
    converged = true;
    for (const de of diodeEdges) {
      const c = de.comp;
      const forward = (de.Q >= 0);
      const wantsForward = forward ? 'forward' : 'reverse';
      if (wantsForward !== c.state) {
        // Only flip if |Q| exceeds hysteresis band.
        if (Math.abs(de.Q) > CONFIG.DIODE.HYST_BAND) {
          c.state = wantsForward;
          converged = false;
        }
      }
    }
  }

  // ── commit tank heights ─────────────────────────────────────────────────────
  integrateHeights(dt, tanks);
}

// Build and solve the MNA system; return { x, iPump } or null on failure.
function runMNA(edges, tanks, N, nodesById, dt) {
  // One extra unknown for the pump current (voltage source augmentation).
  const SZ = N + 1;
  const PUMP_ROW = N;

  const G = zeros(SZ);
  const b = new Float64Array(SZ);

  // ── stamp each edge ─────────────────────────────────────────────────────────
  for (const e of edges) {
    const c  = e.comp;
    const na = nodesById[e.a];
    const nb = nodesById[e.b];
    const ia = na.solverIdx;
    const ib = nb.solverIdx;

    if (c.kind === 'pump') {
      // Ideal voltage source: pumpOut (b) is the + terminal, pumpIn (a) is −.
      // Stamp: b − a = dP.
      mnaStampVSource(G, b, ib, ia, PUMP_ROW, c.dP);
      continue;
    }

    // Effective conductance for this edge.
    let k;
    if (c.kind === 'diode') {
      k = (c.state === 'forward') ? c.kFwd : c.kReverse;
    } else {
      k = c.k;  // resistor or pipe
    }

    mnaStamp(G, ia, ib, k);
  }

  // ── implicit-Euler capacitance stamp for tanks ──────────────────────────────
  // Adds Q_cap = (A/dt)·(h_new − h_old) to each tank's KCL row.
  for (const t of tanks) {
    const cap = t.A / dt;
    G[t.solverIdx][t.solverIdx] += cap;
    b[t.solverIdx]               += cap * t.h;
  }

  const x = solveLinear(G, b);
  if (!x) return null;

  return { x, iPump: x[PUMP_ROW] };
}

// After solving, compute Q (signed flow from .a → .b) for every edge.
function computeEdgeFlows(edges, nodesById, result) {
  const { iPump } = result;

  for (const e of edges) {
    const c  = e.comp;
    const na = nodesById[e.a];
    const nb = nodesById[e.b];

    if (c.kind === 'pump') {
      e.Q = iPump;
      continue;
    }

    let k;
    if (c.kind === 'diode') {
      k = (c.state === 'forward') ? c.kFwd : c.kReverse;
    } else {
      k = c.k;
    }

    e.Q = k * (na.p - nb.p);
  }
}

// Commit solved pressures to tank heights and stash net flow for visuals.
function integrateHeights(dt, tanks) {
  for (const t of tanks) {
    t.lastNetFlow = (t.A / dt) * (t.p - t.h);
    t.h = clamp(t.p, 0, CONFIG.TANK.H_MAX);
  }
}

// Public entry: called from the main loop with accumulated dt.
// Sub-steps to keep the RC time constant resolved correctly.
function physicsTick(dt) {
  if (STATE.needsLayout || STATE.nodes.length === 0) return;

  // Determine number of sub-steps.
  const dtPhys  = clamp(dt, 0, CONFIG.PHYSICS.DT_PHYS_MAX);
  const nSteps  = Math.min(CONFIG.PHYSICS.MAX_SUB_STEPS, Math.max(1, Math.ceil(dtPhys / CONFIG.PHYSICS.DT_PHYS_MIN)));
  const dtSub   = dtPhys / nSteps;

  for (let i = 0; i < nSteps; i++) solveStep(dtSub);
}
</script>
