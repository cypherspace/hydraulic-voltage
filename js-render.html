<script>
// ===== RENDER =====

function poly(ctx, pts, fill, stroke, lw) {
  if (!pts || pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].sx, pts[0].sy);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;              ctx.fill();   }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}
function pp(pts3) { return pts3.map(p => project(p.x, p.y, p.z || 0)); }

// ── Entry point ──────────────────────────────────────────────────────────────
function drawFrame(ctx, timestamp) {
  ctx.clearRect(0, 0, CONFIG.VIEW.W, CONFIG.VIEW.H);
  const sm = STATE.schematicMix;
  if (sm < 1) {
    ctx.globalAlpha = 1 - sm;
    drawReturnPipe(ctx);
    drawTankShell(ctx);
    drawWater(ctx, timestamp);
    drawBarriers(ctx);
    drawPump(ctx, timestamp);
    ctx.globalAlpha = 1;
    drawParticles(ctx, 1 - sm * 0.7);
  }
  if (sm > 0) {
    ctx.globalAlpha = sm;
    drawSchematic(ctx);
    ctx.globalAlpha = 1;
  }
  drawProbeMarkers(ctx);
  drawHoverHighlight(ctx);
}

// ── Tank shell ───────────────────────────────────────────────────────────────
function drawTankShell(ctx) {
  const ld = STATE.layoutData; if (!ld) return;
  const W = ld.totalWidth, Hm = CONFIG.TANK.H_MAX, D = CONFIG.PIPE.DEPTH;
  poly(ctx, pp([{x:0,y:0,z:D},{x:W,y:0,z:D},{x:W,y:Hm,z:D},{x:0,y:Hm,z:D}]), '#bec3cc', '#9499a2', 0.5);
  poly(ctx, pp([{x:0,y:Hm,z:0},{x:W,y:Hm,z:0},{x:W,y:Hm,z:D},{x:0,y:Hm,z:D}]), '#b0b5be', '#9499a2', 0.5);
  poly(ctx, pp([{x:W,y:0,z:0},{x:W,y:Hm,z:0},{x:W,y:Hm,z:D},{x:W,y:0,z:D}]),   '#c4c9d2', '#9499a2', 0.5);
  poly(ctx, pp([{x:0,y:0,z:0},{x:0,y:Hm,z:0},{x:0,y:Hm,z:D},{x:0,y:0,z:D}]),   '#c4c9d2', '#9499a2', 0.5);
  poly(ctx, pp([{x:0,y:0,z:0},{x:W,y:0,z:0},{x:W,y:0,z:D},{x:0,y:0,z:D}]),     '#a8adb6', '#9499a2', 0.5);
}

// ── Water ────────────────────────────────────────────────────────────────────
// Per-tank: gradient front/side faces (depth shading), wavy surface mesh whose
// amplitude tracks |lastNetFlow|, meniscus highlight, and short-lived bubbles
// in chambers with active flow. State for bubbles lives on the tank itself
// (n.bubbles) so it doesn't pollute the edge-particle pool.
function drawWater(ctx, timestamp) {
  const ld = STATE.layoutData; if (!ld) return;
  const D = CONFIG.PIPE.DEPTH;
  const tNodes = STATE.nodes.filter(n => n.kind === 'tank');
  const tSec = (timestamp || 0) / 1000;

  const N = tNodes.length;
  const W = ld.totalWidth;
  const barHw = 0.11; // matches drawOneBarrier; keeps water meeting the barrier face without overlap
  for (let i = 0; i < N; i++) {
    const n = tNodes[i], h = n.h;
    if (h < 0.01) continue;
    // Water spans from the previous barrier's right face to the next barrier's left face,
    // or to the tank wall at the ends — so chambers visually merge into one partitioned tank.
    const xL = (i === 0)     ? 0 : (ld.slotCX[i - 1] + barHw);
    const xR = (i === N - 1) ? W : (ld.slotCX[i]     - barHw);
    const flow = Math.abs(n.lastNetFlow || 0);
    const ampWave = Math.min(0.06, flow * 0.05);

    // ── back face (z = D)
    poly(ctx, pp([{x:xL,y:0,z:D},{x:xR,y:0,z:D},{x:xR,y:h,z:D},{x:xL,y:h,z:D}]), 'rgba(36,82,130,.7)');

    // ── side walls with vertical gradient (only outermost chambers)
    if (i === 0 || i === tNodes.length - 1) {
      const xWall = (i === 0) ? xL : xR;
      const tp = project(xWall, h, D / 2);
      const bp = project(xWall, 0, D / 2);
      const grad = ctx.createLinearGradient(tp.sx, tp.sy, bp.sx, bp.sy);
      grad.addColorStop(0, 'rgba(140,200,235,0.65)');
      grad.addColorStop(1, 'rgba(28,70,120,0.85)');
      poly(ctx, pp([{x:xWall,y:0,z:0},{x:xWall,y:0,z:D},{x:xWall,y:h,z:D},{x:xWall,y:h,z:0}]), grad);
    }

    // ── front face with vertical gradient (lighter near surface, deeper at floor)
    const tpF = project(xL, h, 0);
    const bpF = project(xL, 0, 0);
    const gradF = ctx.createLinearGradient(tpF.sx, tpF.sy, bpF.sx, bpF.sy);
    gradF.addColorStop(0, 'rgba(140,200,235,0.78)');
    gradF.addColorStop(1, 'rgba(36,82,130,0.78)');
    poly(ctx, pp([{x:xL,y:0,z:0},{x:xR,y:0,z:0},{x:xR,y:h,z:0},{x:xL,y:h,z:0}]), gradF);

    // ── wavy surface (top face) — subdivided along x
    const segs = 18;
    const front = [], back = [];
    for (let s = 0; s <= segs; s++) {
      const tx = s / segs;
      const x = xL + (xR - xL) * tx;
      const wave = ampWave * (
        Math.sin(2.1 * x + tSec * 4.0) +
        0.6 * Math.sin(5.3 * x - tSec * 6.4 + 1.3) +
        0.4 * Math.sin(11.0 * x + tSec * 9.1 + 0.7)
      );
      const yWave = h + wave;
      front.push(project(x, yWave, 0));
      back.push(project(x, yWave, D));
    }
    const surfPts = front.concat(back.slice().reverse());
    poly(ctx, surfPts, 'rgba(150,205,235,.85)', 'rgba(100,165,215,.95)', 1);

    // ── meniscus highlight band (just below front crest)
    ctx.save();
    ctx.strokeStyle = 'rgba(210,235,250,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    front.forEach((p, j) => j ? ctx.lineTo(p.sx, p.sy + 2) : ctx.moveTo(p.sx, p.sy + 2));
    ctx.stroke();
    ctx.restore();

    // ── bubbles (tank-local; spawn rate scales with |lastNetFlow|)
    if (!n.bubbles) n.bubbles = [];
    const dt = Math.min(0.1, tSec - (n._bubblesLastT || tSec));
    n._bubblesLastT = tSec;
    const spawnPerSec = Math.min(10, flow * 6);
    if (spawnPerSec > 0.4 && Math.random() < spawnPerSec * dt) {
      n.bubbles.push({
        x: xL + Math.random() * (xR - xL),
        y: 0.05 + Math.random() * h * 0.6,
        z: Math.random() * D,
        rise: 0.4 + Math.random() * 0.7,
        born: tSec,
        life: 0.7 + Math.random() * 0.7
      });
    }
    ctx.save();
    ctx.fillStyle = 'rgba(225,240,255,0.9)';
    n.bubbles = n.bubbles.filter(b => {
      const age = tSec - b.born;
      if (age > b.life) return false;
      b.y += b.rise * dt;
      if (b.y > h - 0.05) return false;
      const sp = project(b.x, b.y, b.z);
      ctx.globalAlpha = (1 - age / b.life) * 0.85;
      ctx.beginPath(); ctx.arc(sp.sx, sp.sy, 1.6, 0, Math.PI * 2); ctx.fill();
      return true;
    });
    ctx.restore();
  }
}

// ── Barriers ─────────────────────────────────────────────────────────────────
function drawBarriers(ctx) {
  const ld = STATE.layoutData; if (!ld) return;
  const D = CONFIG.PIPE.DEPTH, Hm = CONFIG.TANK.H_MAX;
  STATE.slots.forEach((sl, i) => {
    const sx = ld.slotCX[i];
    if (sl.kind === 'parallel') {
      drawOneBarrier(ctx, sx, 0,        D * 0.38, Hm, sl.params.k1, 'barrier', sl, 'k1');
      drawOneBarrier(ctx, sx, D * 0.62, D,        Hm, sl.params.k2, 'barrier', sl, 'k2');
    } else if (sl.kind === 'diode') {
      drawOneBarrier(ctx, sx, 0, D, Hm, CONFIG.DIODE.K_FWD, 'diode', sl, 'k');
    } else {
      drawOneBarrier(ctx, sx, 0, D, Hm, sl.params.k != null ? sl.params.k : CONFIG.RESISTOR.K_DEFAULT, sl.kind, sl, 'k');
    }
  });
}

function drawOneBarrier(ctx, cx, z0, z1, H, k, role, slot, kKey) {
  const hw = 0.11;
  const fill = role === 'diode' ? '#e8c475' : role === 'capacitor' ? '#90c0e0' : '#c8a060';
  // back + side + top faces (unchanged)
  poly(ctx, pp([{x:cx-hw,y:0,z:z1},{x:cx+hw,y:0,z:z1},{x:cx+hw,y:H,z:z1},{x:cx-hw,y:H,z:z1}]), '#998050');
  poly(ctx, pp([{x:cx+hw,y:0,z:z0},{x:cx+hw,y:H,z:z0},{x:cx+hw,y:H,z:z1},{x:cx+hw,y:0,z:z1}]), '#b09060');
  poly(ctx, pp([{x:cx-hw,y:H,z:z0},{x:cx+hw,y:H,z:z0},{x:cx+hw,y:H,z:z1},{x:cx-hw,y:H,z:z1}]), '#b8a070');
  // ── front face: solid base, then sponge texture on top
  const fpts = pp([{x:cx-hw,y:0,z:z0},{x:cx+hw,y:0,z:z0},{x:cx+hw,y:H,z:z0},{x:cx-hw,y:H,z:z0}]);
  poly(ctx, fpts, fill, '#888', 0.5);
  ctx.save();
  ctx.beginPath();
  fpts.forEach((p,j) => j ? ctx.lineTo(p.sx,p.sy) : ctx.moveTo(p.sx,p.sy));
  ctx.closePath();
  ctx.clip();
  const tex = getSpongeTexture(slot, k, kKey, role);
  ctx.fillStyle = ctx.createPattern(tex, 'repeat');
  let bx0 = Infinity, bx1 = -Infinity, by0 = Infinity, by1 = -Infinity;
  for (const p of fpts) { if (p.sx<bx0) bx0=p.sx; if (p.sx>bx1) bx1=p.sx; if (p.sy<by0) by0=p.sy; if (p.sy>by1) by1=p.sy; }
  ctx.fillRect(bx0, by0, bx1 - bx0, by1 - by0);
  ctx.restore();
  // diode arrow
  if (role === 'diode') {
    const m = project(cx, H * 0.5, z0);
    const r = 7;
    ctx.save(); ctx.fillStyle = '#7a4800'; ctx.strokeStyle = '#7a4800'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(m.sx-r,m.sy); ctx.lineTo(m.sx+r*0.6,m.sy-r*0.7); ctx.lineTo(m.sx+r*0.6,m.sy+r*0.7); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(m.sx+r*0.6,m.sy-r*0.8); ctx.lineTo(m.sx+r*0.6,m.sy+r*0.8); ctx.stroke();
    ctx.restore();
  }
}

// Build (or reuse) an offscreen canvas with a procedural sponge pattern.
// More conductive (higher k → more porous) ⇒ more visible holes.
// Cached per slot keyed by (role, kKey, k) so parallel slots can hold two.
function getSpongeTexture(slot, k, kKey, role) {
  if (!slot._spongeCache) slot._spongeCache = new Map();
  const cacheKey = role + '|' + kKey + '|' + k.toFixed(3);
  let cached = slot._spongeCache.get(cacheKey);
  if (cached) return cached;

  const c = document.createElement('canvas');
  c.width = 40; c.height = 80;
  const cx = c.getContext('2d');

  const palette = role === 'diode'
    ? { base: '#e8c475', dark: '#a07820', light: '#f8e0a0' }
    : role === 'capacitor'
    ? { base: '#90c0e0', dark: '#3a6090', light: '#c0e0f4' }
    : { base: '#c8a060', dark: '#7a4810', light: '#dcb878' };

  cx.fillStyle = palette.base;
  cx.fillRect(0, 0, c.width, c.height);

  const kMax = CONFIG.RESISTOR.K_MAX;
  const tk = clamp(k / kMax, 0, 1);
  const nDark = Math.round(80 * tk + 25);
  cx.fillStyle = palette.dark;
  for (let i = 0; i < nDark; i++) {
    const x = Math.random() * c.width;
    const y = Math.random() * c.height;
    const r = 1.4 + Math.random() * 1.7;
    cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
  }
  cx.fillStyle = palette.light;
  cx.globalAlpha = 0.55;
  for (let i = 0; i < 18; i++) {
    const x = Math.random() * c.width;
    const y = Math.random() * c.height;
    const r = 0.7 + Math.random() * 0.9;
    cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;

  slot._spongeCache.set(cacheKey, c);
  if (slot._spongeCache.size > 8) {
    slot._spongeCache.delete(slot._spongeCache.keys().next().value);
  }
  return c;
}

// ── Bottom return duct + vertical drop pipes ────────────────────────────────
// Painter's-algorithm draw order: back face → drop pipes (back) → duct sides
// → drop pipes (front) → duct front. Drop pipes anchor at chamber centres so
// the visual lines up with the actual edge paths in the model.
function drawReturnPipe(ctx) {
  const ld = STATE.layoutData; if (!ld) return;
  const W = ld.totalWidth, D = CONFIG.PIPE.DEPTH;
  const yT = CONFIG.PIPE.BOTTOM_Y, yB = yT - CONFIG.PIPE.BOTTOM_HEIGHT;
  const arm = CONFIG.PUMP.WIDTH / 2;
  const pc = ld.pumpCenterX;
  const dHW = CONFIG.PIPE.DROP_HALF_WIDTH;
  // Drop-pipe anchor x: end-chamber centres (matches the actual model edge paths).
  const xL = ld.chamberCX[0];
  const xR = ld.chamberCX[ld.chamberCX.length - 1];
  // Pipe colour palette (slightly cooler than the tank shell so they stand apart).
  const cBack = '#82878f', cBackLit = '#9499a2', cSide = '#a8acb4', cFront = '#cfd3d9', cFrontEdge = '#7a7e86';

  // ── 1. duct back face (full width)
  poly(ctx, pp([{x:0,y:yB,z:D},{x:W,y:yB,z:D},{x:W,y:yT,z:D},{x:0,y:yT,z:D}]), cBack, cBackLit, 0.5);

  // ── 2. drop-pipe back faces (between tank floor y=0 and duct top y=yT)
  for (const xC of [xL, xR]) {
    poly(ctx, pp([
      {x:xC-dHW, y:yT, z:D}, {x:xC+dHW, y:yT, z:D},
      {x:xC+dHW, y:0,  z:D}, {x:xC-dHW, y:0,  z:D}
    ]), cBack);
  }

  // ── 3. duct top (left and right of pump cutout) — visible because y_top is below the tank
  for (const [x0,x1] of [[0, pc - arm], [pc + arm, W]]) {
    poly(ctx, pp([{x:x0,y:yT,z:0},{x:x1,y:yT,z:0},{x:x1,y:yT,z:D},{x:x0,y:yT,z:D}]), cSide, cBackLit, 0.5);
  }

  // ── 4. duct bottom (visible underside)
  poly(ctx, pp([{x:0,y:yB,z:0},{x:W,y:yB,z:0},{x:W,y:yB,z:D},{x:0,y:yB,z:D}]), '#7a7e86');

  // ── 5. duct end caps (left and right outermost faces)
  poly(ctx, pp([{x:0,y:yB,z:0},{x:0,y:yT,z:0},{x:0,y:yT,z:D},{x:0,y:yB,z:D}]), cSide, cBackLit, 0.5);
  poly(ctx, pp([{x:W,y:yB,z:0},{x:W,y:yT,z:0},{x:W,y:yT,z:D},{x:W,y:yB,z:D}]), cSide, cBackLit, 0.5);

  // ── 6. drop-pipe side faces (front-facing right side of each drop-pipe — these "sell" the 3D shape)
  for (const xC of [xL, xR]) {
    poly(ctx, pp([
      {x:xC+dHW, y:yT, z:0}, {x:xC+dHW, y:0, z:0},
      {x:xC+dHW, y:0,  z:D}, {x:xC+dHW, y:yT, z:D}
    ]), cSide, cBackLit, 0.5);
  }

  // ── 7. duct front face — split around the pump cutout
  for (const [x0,x1] of [[0, pc - arm], [pc + arm, W]]) {
    poly(ctx, pp([{x:x0,y:yB,z:0},{x:x1,y:yB,z:0},{x:x1,y:yT,z:0},{x:x0,y:yT,z:0}]), cFront, cFrontEdge, 1);
  }

  // ── 8. drop-pipe front faces (drawn last so they sit on top of duct front)
  for (const xC of [xL, xR]) {
    poly(ctx, pp([
      {x:xC-dHW, y:yT, z:0}, {x:xC+dHW, y:yT, z:0},
      {x:xC+dHW, y:0,  z:0}, {x:xC-dHW, y:0,  z:0}
    ]), cFront, cFrontEdge, 1);
  }
}

// ── Pump ─────────────────────────────────────────────────────────────────────
function drawPump(ctx, timestamp) {
  const ld = STATE.layoutData; if (!ld) return;
  const cx = ld.pumpCenterX, arm = CONFIG.PUMP.WIDTH / 2;
  const D = CONFIG.PIPE.DEPTH, yT = CONFIG.PIPE.BOTTOM_Y, yB = yT - CONFIG.PIPE.BOTTOM_HEIGHT;
  poly(ctx, pp([{x:cx-arm,y:yB,z:D},{x:cx+arm,y:yB,z:D},{x:cx+arm,y:yT,z:D},{x:cx-arm,y:yT,z:D}]), '#2e5c8a');
  poly(ctx, pp([{x:cx+arm,y:yB,z:0},{x:cx+arm,y:yT,z:0},{x:cx+arm,y:yT,z:D},{x:cx+arm,y:yB,z:D}]), '#234c7a');
  poly(ctx, pp([{x:cx-arm,y:yT,z:0},{x:cx+arm,y:yT,z:0},{x:cx+arm,y:yT,z:D},{x:cx-arm,y:yT,z:D}]), '#4878a8');
  poly(ctx, pp([{x:cx-arm,y:yB,z:0},{x:cx+arm,y:yB,z:0},{x:cx+arm,y:yT,z:0},{x:cx-arm,y:yT,z:0}]), '#3a6ea0', '#1e3d60', 1);
  // impeller — sits in the LEFT half (V-source side)
  const pwr = STATE.pumpTarget;
  const cxImp = cx - arm / 2;
  const ctr = project(cxImp, (yB + yT) / 2, 0);
  const rOut = arm * CONFIG.VIEW.PX_PER_UNIT * 0.32;
  const rHub = rOut * 0.22;
  const angle = (timestamp / 1000) * pwr * Math.PI * 8;
  ctx.save();
  ctx.strokeStyle = pwr > 0.01 ? '#90c8ff' : '#5a85b0'; ctx.lineWidth = 2;
  for (let s = 0; s < 6; s++) {
    const a = angle + s / 6 * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(ctr.sx + Math.cos(a)*rHub, ctr.sy + Math.sin(a)*rHub);
    ctx.lineTo(ctr.sx + Math.cos(a)*rOut, ctr.sy + Math.sin(a)*rOut); ctx.stroke();
  }
  ctx.fillStyle = '#3060a0'; ctx.beginPath(); ctx.arc(ctr.sx, ctr.sy, rHub, 0, Math.PI*2); ctx.fill();

  // internal-resistance coil — sits in the RIGHT half (between nPumpIn and nPumpMid)
  const cxRes = cx + arm / 2;
  const cy = (yB + yT) / 2;
  const coilL = project(cxRes - arm * 0.4, cy, 0);
  const coilR = project(cxRes + arm * 0.4, cy, 0);
  ctx.strokeStyle = '#cc8a3a'; ctx.lineWidth = 2;
  const segs = 8;
  ctx.beginPath();
  for (let s = 0; s <= segs; s++) {
    const t = s / segs;
    const px = coilL.sx + (coilR.sx - coilL.sx) * t;
    const py = coilL.sy + (s % 2 === 0 ? -4 : 4);
    s ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.stroke();

  if (pwr > 0.01) {
    const lp = project(cx, yT + 0.12, 0);
    ctx.fillStyle = '#1f4fa3'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.round(pwr * 100) + '%', lp.sx, lp.sy - 3);
  }
  ctx.restore();
}

// ── Particles ────────────────────────────────────────────────────────────────
function edgePointAt(path, s) {
  if (path.length < 2) return path[0] || {x:0,y:0,z:0};
  let total = 0;
  const segs = [];
  for (let i = 1; i < path.length; i++) {
    const a = path[i-1], b = path[i];
    const dx=b.x-a.x, dy=b.y-a.y, dz=(b.z||0)-(a.z||0);
    const l = Math.sqrt(dx*dx+dy*dy+dz*dz) || 1e-6;
    segs.push(l); total += l;
  }
  let t = clamp(s, 0, 1) * total;
  for (let i = 0; i < segs.length; i++) {
    if (t <= segs[i] + 1e-9) {
      const u = t / segs[i], a = path[i], b = path[i+1];
      return { x: lerp(a.x,b.x,u), y: lerp(a.y,b.y,u), z: lerp(a.z||0,b.z||0,u) };
    }
    t -= segs[i];
  }
  return path[path.length - 1];
}

function drawParticles(ctx, alpha) {
  ctx.save(); ctx.globalAlpha = alpha != null ? alpha : 1;
  for (const p of STATE.particles) {
    const e = p.edgeId != null ? STATE.edgesById[p.edgeId] : null;
    if (!e || e.path.length < 1) continue;
    // Particles only on pump-loop edges (pipes, pump body). Barrier/diode flow
    // is conveyed by the chamber-side bubbles + wave amplitude in drawWater.
    if (e.role !== 'pipe' && e.role !== 'pump' && e.role !== 'pump-rint') continue;
    const pt = edgePointAt(e.path, p.s);
    const sp = project(pt.x, pt.y + (p.zJitter || 0) * 0.1, (pt.z || 0) + (p.zJitter || 0) * 0.15);
    const speed = Math.abs(e.Q);
    const r = clamp(CONFIG.PARTICLE.BASE_SIZE * (0.6 + speed * 0.2), 1.2, 4.5);
    ctx.beginPath(); ctx.arc(sp.sx, sp.sy, r, 0, Math.PI*2);
    ctx.fillStyle = e.role === 'pump' ? 'rgba(80,160,255,0.8)' : 'rgba(210,235,255,0.85)';
    ctx.fill();
  }
  ctx.restore();
}

// ── Schematic overlay ─────────────────────────────────────────────────────────
function drawSchematic(ctx) {
  const ld = STATE.layoutData; if (!ld) return;
  const Y  = 2.5;  // world y for schematic wire
  const tN = STATE.nodes.filter(n => n.kind === 'tank');
  ctx.save(); ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.setLineDash([]);
  // Top wire
  ctx.beginPath();
  tN.forEach((n,i) => {
    const p = project(ld.chamberCX[i], Y, 0);
    i ? ctx.lineTo(p.sx, p.sy) : ctx.moveTo(p.sx, p.sy);
  });
  ctx.stroke();
  // Bottom wire (return)
  const lp = project(ld.chamberCX[0], Y - 3.2, 0);
  const rp = project(ld.chamberCX[tN.length-1], Y - 3.2, 0);
  const ll = project(ld.chamberCX[0], Y, 0);
  const rr = project(ld.chamberCX[tN.length-1], Y, 0);
  ctx.beginPath(); ctx.moveTo(ll.sx,ll.sy); ctx.lineTo(lp.sx,lp.sy); ctx.lineTo(rp.sx,rp.sy); ctx.lineTo(rr.sx,rr.sy); ctx.stroke();
  ctx.setLineDash([]);
  // Component symbols at slot positions
  STATE.slots.forEach((sl, i) => {
    const sp = project(ld.slotCX[i], Y, 0);
    if      (sl.kind === 'resistor' || sl.kind === 'capacitor') schResistor(ctx, sp.sx, sp.sy, sl.params.k);
    else if (sl.kind === 'diode')    schDiode(ctx, sp.sx, sp.sy);
    else if (sl.kind === 'parallel') schParallel(ctx, sp.sx, sp.sy, sl.params.k1, sl.params.k2);
  });
  // Battery symbol (with terminal dP = source dP − iPump · R_int)
  const bp = project(ld.pumpCenterX, Y - 3.2, 0);
  const pumpEdge = STATE.edgesById[STATE.pumpEdgeId];
  const iPump = pumpEdge ? pumpEdge.Q : 0;
  const dpSource = getPumpDP();
  const dpTerminal = dpSource - iPump * CONFIG.PUMP.R_INT;
  schBattery(ctx, bp.sx, bp.sy, dpSource, dpTerminal);
  // Voltage labels on tank nodes
  ctx.font = '10px monospace'; ctx.fillStyle = '#1f4fa3'; ctx.textAlign = 'center';
  tN.forEach((n, i) => {
    const p = project(ld.chamberCX[i], Y + 0.4, 0);
    ctx.fillText(n.h.toFixed(2) + ' V', p.sx, p.sy);
  });
  ctx.restore();
}

function schResistor(ctx, x, y, k) {
  const w = 20, h = 9;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.rect(x-w/2, y-h/2, w, h); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#555'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('R' + (k != null ? '=' + (+k).toFixed(1) : ''), x, y + h/2 + 9);
}
function schDiode(ctx, x, y) {
  const r = 9;
  ctx.fillStyle = '#e0a030'; ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-r,y-r*0.7); ctx.lineTo(x-r,y+r*0.7); ctx.lineTo(x+r*0.5,y); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+r*0.5,y-r*0.7); ctx.lineTo(x+r*0.5,y+r*0.7); ctx.stroke();
}
function schParallel(ctx, x, y, k1, k2) {
  schResistor(ctx, x, y - 11, k1);
  schResistor(ctx, x, y + 11, k2);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-12,y-22); ctx.lineTo(x-12,y+22); ctx.moveTo(x+12,y-22); ctx.lineTo(x+12,y+22); ctx.stroke();
}
function schBattery(ctx, x, y, dpSource, dpTerminal) {
  ctx.strokeStyle = '#1f4fa3'; ctx.lineWidth = 2.5;
  for (let s = 0; s < 2; s++) {
    const hw = s === 0 ? 13 : 8, px = x + (s === 0 ? -7 : 7);
    ctx.beginPath(); ctx.moveTo(px, y-hw); ctx.lineTo(px, y+hw); ctx.stroke();
  }
  ctx.fillStyle = '#1f4fa3'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(dpSource.toFixed(2) + ' V', x, y - 18);
  if (dpTerminal != null && Math.abs(dpTerminal - dpSource) > 0.01) {
    ctx.fillStyle = '#5a85b0'; ctx.font = '9px monospace';
    ctx.fillText('term ' + dpTerminal.toFixed(2), x, y + 26);
  }
}

// ── Probe markers ─────────────────────────────────────────────────────────────
function drawProbeMarkers(ctx) {
  const canvas = document.getElementById('canvas');
  const scale  = canvas.offsetWidth / CONFIG.VIEW.W;
  for (const probe of STATE.probes) {
    const badge = document.getElementById('probe-' + probe.id);
    if (!badge) continue;
    const bx = (probe.screenPos.x + badge.offsetWidth / 2) / scale;
    const by = (probe.screenPos.y + badge.offsetHeight / 2) / scale;
    const isFlow = probe.kind === 'flow';
    ctx.save(); ctx.setLineDash([3,3]); ctx.lineWidth = 1;
    ctx.strokeStyle = isFlow ? '#a31e1e' : '#1f4fa3';
    ctx.fillStyle   = isFlow ? '#a31e1e' : '#1f4fa3';
    const targets = probe.kind === 'pressure'
      ? probe.refs.map(id => { const n = STATE.nodesById[id]; return n ? project(n.pos.x, n.pos.y, n.pos.z) : null; })
      : (() => { const e = STATE.edgesById[probe.refs[0]]; if (!e) return []; const m = edgePointAt(e.path,0.5); return [project(m.x,m.y,m.z||0)]; })();
    for (const sp of targets) {
      if (!sp) continue;
      ctx.beginPath(); ctx.moveTo(sp.sx,sp.sy); ctx.lineTo(bx,by); ctx.stroke();
      ctx.beginPath(); ctx.arc(sp.sx,sp.sy,4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawHoverHighlight(ctx) {
  if (STATE.hoverNodeId) {
    const n = STATE.nodesById[STATE.hoverNodeId];
    if (n) { const sp = project(n.pos.x,n.pos.y,n.pos.z); ctx.beginPath(); ctx.arc(sp.sx,sp.sy,8,0,Math.PI*2); ctx.strokeStyle='#1f4fa3'; ctx.lineWidth=2.5; ctx.stroke(); }
  }
  if (STATE.hoverEdgeId) {
    const e = STATE.edgesById[STATE.hoverEdgeId];
    if (e) { const m = edgePointAt(e.path,0.5); const sp=project(m.x,m.y,m.z||0); ctx.beginPath(); ctx.arc(sp.sx,sp.sy,7,0,Math.PI*2); ctx.strokeStyle='#a31e1e'; ctx.lineWidth=2.5; ctx.stroke(); }
  }
}
</script>
